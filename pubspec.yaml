name: tkd
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  http: ^1.2.0
  camera: ^0.10.5+9
  image: ^4.1.3
  shared_preferences: ^2.2.0
  google_mlkit_face_detection: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
    
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/imagess.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/imagess.png"

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/